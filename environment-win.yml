name: BPML
channels:
  - pytorch
  - conda-forge
channel_priority: strict

dependencies:
  - python=3.11

  # Core scientific stack
  - numpy<2
  - scipy
  - pandas
  - matplotlib
  - scikit-learn

  # Sleep/EDF tooling
  - mne
  - pyedflib
  - yasa

  # PyTorch pinned for GSSC compatibility
  - pytorch=2.5.*
  - torchvision
  - torchaudio
  - cpuonly

  - pip
  - pip:
      - gssc
      - dtcwt
      - art